{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="login-box">
        <h2>Cadastro</h2>

        {% if erro %}
            <p style="color:red; text-align:center;">
                {{ erro }}
            </p>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            
            <input type="text" name="nome_completo" placeholder="Nome completo" required>
            <input type="email" name="email" placeholder="E-mail" required>
            <input type="text" id="cpf" name="cpf" placeholder="CPF" required>
            <input type="password" id="password" name="password" placeholder="Senha" required>
            <input type="password" name="confirm_password" placeholder="Confirmar senha" required>

            <div id="password-rules" style="display:none; font-size:12px;">
                <p id="length" style="color:red;">• Mínimo 8 caracteres</p>
                <p id="lower" style="color:red;">• Letra minúscula</p>
                <p id="upper" style="color:red;">• Letra maiúscula</p>
                <p id="number" style="color:red;">• Número</p>
                <p id="special" style="color:red;">• Caractere especial (!@#$...)</p>
            </div>

            <input type="submit" value="Cadastrar">
        </form>

        <a href="{% url 'login' %}">Já possui conta? Faça login</a>
    </div>
<script src="{% static 'js/cadastro_user.js' %}"></script>
</body>
</html>
